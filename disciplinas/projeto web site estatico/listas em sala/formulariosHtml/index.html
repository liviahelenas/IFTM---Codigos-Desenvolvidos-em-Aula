<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body style="background-color: rgb(253, 255, 233); padding: 4%;">

    <h1 style="color: rgb(39, 39, 39); font-family: Arial, Helvetica, sans-serif;">Formulário html</h1>


    <form
        style="  border: 1px solid black;display: flex; flex-direction: column; align-items: flex-start;justify-content: flex-start; gap:0.5rem; padding: 2%;">
        <!--
        label: identifica o campo com uma palavra que será visível para o usuário

        input: determina as informações que estarão contidas no input. Determina o tipo do input
        name: mapeamento para o label
        id: mapeamento para o Javascript
        autocomplete: completa com informações
        -->
        <label for="nome" style="color: rgb(39, 39, 39) ;">Nome:</label>
        <input type="text" id="nome" name="nome" style="width: 300px; height: auto;">

        <!--Seletor-->
        <label for="genero" style="color: rgb(39, 39, 39) ;">Gênero:</label>
        <select name="genero" id="genero" style="width: 300px; height: auto;">
            <option value="">Selecione uma opção</option>
            <option value="masculino">Masculino</option>
            <option value="feminino">Feminino</option>
            <option value="outro">Outro</option>
        </select>

        <label for="estadoCivil" style="color: rgb(39, 39, 39) ;">Estado Civil:</label>
        <select name="estadoCivil" id="estadoCivil" style="width: 300px; height: auto;">
            <option value="">Selecione uma opção</option>
            <option value="casado">Casado</option>
            <option value="solteiro">Solteiro</option>
            <option value="viuvo">Viuvo</option>
            <option value="divorciado">Divorciado</option>
            <option value="outro">Outro</option>
        </select>

        <!--email-->
        <label for="email" style="color: rgb(39, 39, 39) ;">Email:</label>
        <input type="email" name="email" id="email" style="width: 300px; height: auto;">

        <label for="endereco" style="color: rgb(39, 39, 39) ;">Endereco</label>
        <input type="text" name="endereco" id="endereco" autocomplete="adress-line1"
            style="width: 300px; height: auto;">

        <!--numero de telefone-->
        <label for="numero" style="color: rgb(39, 39, 39) ;">Numero da Casa:</label>
        <input type="number" name="numeroTelefone" id="numeroTelefone" style="width: 300px; height: auto;">

        <label for="telefone" style="color: rgb(39, 39, 39) ;">Numero de Telefone:</label>
        <input type="tel" name="telefone" id="telefone" style="width: 300px; height: auto;">

        <label for="data" style="color: rgb(39, 39, 39) ;">Data de Nascimento:</label>
        <input type="date" name="data" id="data" style="width: 300px; height: auto;">

        <button type="reset" style="height: 40px; width: 300px;">Limpar</button>
        <button type="submit" style="height: 40px; width: 300px;">Cadastrar</button>

    </form>

</body>

</html>
